name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Package and push chart to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "4.1.1"

      - name: Set up go-task
        uses: arduino/setup-task@v2
        with:
          version: "3.48.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Helm dependency update
        run: |
          for attempt in 1 2 3; do
            helm dependency update charts/sympozium-events/ && break
            echo "helm dependency update failed (attempt $attempt/3), retrying in 10s..."
            sleep 10
          done

      - name: Extract CRDs from subchart
        run: task crds:extract

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/sympozium-events/ --destination dist/

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push \
            dist/sympozium-events-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/chrisk700/sympozium-events
