{{- /*
  rbac.yaml
  ---------
  ServiceAccount in the release namespace.
  Role in sympozium-system — create AgentRuns.
  RoleBinding in sympozium-system — cross-namespace binding to SA in release namespace.

  subject.namespace MUST be set explicitly because the SA (release namespace)
  differs from the RoleBinding namespace (sympozium-system).
*/ -}}

{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sympozium-events.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sympozium-events.labels" . | nindent 4 }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sympozium-events.fullname" . }}-agentrun-creator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sympozium-events.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sympozium.ai"]
    resources: ["agentruns"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sympozium-events.fullname" . }}-agentrun-creator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sympozium-events.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sympozium-events.fullname" . }}-agentrun-creator
subjects:
  - kind: ServiceAccount
    name: {{ include "sympozium-events.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
