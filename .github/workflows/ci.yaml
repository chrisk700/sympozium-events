name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint, test, and template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "4.1.1"

      - name: Cache Helm plugins and repository cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-${{ runner.os }}-${{ hashFiles('charts/sympozium-events/Chart.lock') }}
          restore-keys: |
            helm-${{ runner.os }}-

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Set up go-task
        uses: arduino/setup-task@v2
        with:
          version: "3.48.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (helm lint --strict)
        run: task lint

      - name: Test (helm-unittest)
        run: task test

      - name: Template (regression check)
        run: task template
