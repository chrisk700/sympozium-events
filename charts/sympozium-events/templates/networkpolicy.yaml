{{- /*
  networkpolicy.yaml
  ------------------
  Allows egress from all pods in argoEvents.resourceNamespace to the Argo
  Events JetStream EventBus StatefulSet on port 4222 (NATS client) and
  port 6222 (NATS cluster routing between StatefulSet peers).

  podSelector: {} targets every pod in the namespace — EventSource pods,
  Sensor pods, and the EventBus controller all legitimately need port 4222
  access. Argo Events does not expose a stable shared label across these
  pod types, so namespace-wide selection is the correct scope.

  Only relevant when the cluster has a default-deny-egress NetworkPolicy in
  argo-events. Harmless (additive) when no default-deny is present.

  Gated on networkPolicy.enabled (default true).
*/ -}}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sympozium-events.fullname" . }}-eventbus-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sympozium-events.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 6222
      to:
        - podSelector: {}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
